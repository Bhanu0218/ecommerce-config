


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true




logging:
  level:
    root: INFO

    com.shoppy: DEBUG

    io.github.resilience4j: DEBUG

    org.springframework.cloud.gateway: DEBUG

    org.springframework.cloud.openfeign: DEBUG
  pattern:
    level: "%5p[${spring.application.name}, %X{trace_id}, %X{span_id}]"

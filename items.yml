      ddl-auto: update
    show-sql: true



server:
  port: 8080

info:
  app:
    name: "items"
    description: "items catalog service for our ecommerce application"

resilience4j:
  ratelimiter:
    instances:
      getItemById:
        limit-for-period: 1
        limit-refresh-period: 5s
        timeout-duration: 1s

